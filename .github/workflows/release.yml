name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version matches tag
        run: |
          PKG=$(node -p "require('./packages/rozenite-zustand-manager/package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::packages/rozenite-zustand-manager version ($PKG) does not match tag ($TAG)"
            exit 1
          fi

      - name: Typecheck + lint + test
        run: pnpm typecheck && pnpm lint && pnpm test

      - name: Build
        run: pnpm build:web && pnpm build:plugin

      - name: Check if version is already on npm
        id: published
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if npm view "rozenite-zustand-manager@${TAG}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "rozenite-zustand-manager@${TAG} is already on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.published.outputs.skip != 'true'
        run: pnpm --filter rozenite-zustand-manager publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve prerelease flag
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" == 0.* ]] || [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.prerelease == 'true' }}
