version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      types:
        patterns:
          - "@types/*"
      dev-tooling:
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "typescript"
      rozenite:
        patterns:
          - "@rozenite/*"
          - "rozenite"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
