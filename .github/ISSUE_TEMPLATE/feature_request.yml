name: ✨ Feature request
description: Propose a new feature or enhancement
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature! Before continuing, please search [existing issues](https://github.com/malopezr7/rozenite-zustand-manager/issues) to make sure it isn't already requested.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. What are you trying to do that the plugin doesn't currently support?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like the plugin to behave? API sketches, screenshots, or pseudo-code welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, related plugins, or other approaches that didn't fit.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which artifact would this touch?
      multiple: true
      options:
        - DevTools panel UI
        - React Native runtime
        - Metro transformer / autodiscovery
        - Bridge contract
        - Documentation
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I'd be happy to open a PR for this
        - label: I'd like guidance / pairing first
